# Credenciais sensíveis — substitua os valores antes de aplicar
# Referência: stringData aceita texto puro (sem base64)
apiVersion: v1
kind: Secret
metadata:
  name: cllone-secrets
  namespace: cllone
type: Opaque
stringData:
  SECRET_KEY: "troque-por-uma-chave-secreta-longa-e-aleatoria"
  POSTGRES_DB: cllone
  POSTGRES_USER: cllone
  POSTGRES_PASSWORD: "troque-por-uma-senha-forte"
