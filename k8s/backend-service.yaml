# Service nomeado "backend" para que o nginx do frontend
# resolva proxy_pass http://backend:8000 pelo DNS interno do k8s
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cllone
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
